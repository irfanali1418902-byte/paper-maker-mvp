# Tool config lives here so ruff and black both find it automatically.
# This file is intentionally minimal — no build-system / project metadata,
# since paper-maker-mvp ships as a directory, not as a pip-installable
# package.

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
# Sensible defaults:
#   E, W  -- pycodestyle errors/warnings
#   F     -- pyflakes (unused imports, undefined names)
#   I     -- isort (import ordering)
#   B     -- flake8-bugbear (common Python pitfalls)
select = ["E", "F", "I", "W", "B"]

# E501 (line too long) is owned by Black — disabling here avoids two
# tools fighting over the same verdict.
ignore = ["E501"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI ki dependency-injection constructors ko default-arg position mein
# call karna framework ki conventional usage hai (File(...), Depends(...),
# etc.). Default B008 rule generally good hai but FastAPI specifically
# isi pattern par chalta hai.
extend-immutable-calls = [
    "fastapi.Body",
    "fastapi.Cookie",
    "fastapi.Depends",
    "fastapi.File",
    "fastapi.Form",
    "fastapi.Header",
    "fastapi.Path",
    "fastapi.Query",
]
