<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Exam Paper — Print</title>
<style>
  @page { size: A4; margin: 14mm; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; color: #1a1a1a; margin: 0; background: #f2f2f2; }

  .toolbar { position: sticky; top: 0; background: #1d6e56; padding: 10px 20px; display: flex; gap: 10px; align-items: center; z-index: 10; }
  .toolbar button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; background: #fff; color: #1d6e56; font-weight: 600; }
  .toolbar span { color: #fff; font-size: 13px; }

  .sheet { max-width: 210mm; margin: 20px auto; background: #fff; padding: 14mm; box-shadow: 0 2px 10px rgba(0,0,0,.15); }

  .letterhead { display: flex; align-items: center; gap: 16px; border-bottom: 3px solid var(--accent, #0e4d3c); padding-bottom: 12px; margin-bottom: 14px; }
  .letterhead img.logo { width: 64px; height: 64px; object-fit: contain; border-radius: 8px; flex-shrink: 0; }
  .letterhead .names { flex: 1; text-align: center; }
  .letterhead .school-en { font-size: 22px; font-weight: 800; color: var(--accent, #0e4d3c); }
  .letterhead .school-ur { font-size: 19px; font-weight: 700; direction: rtl; font-family: "Noto Nastaliq Urdu", serif; margin-top: 2px; }
  .letterhead .address { font-size: 12px; color: #555; margin-top: 4px; }

  .paper-title { text-align: center; margin: 10px 0 14px; }
  .paper-title h2 { margin: 0; font-size: 17px; text-decoration: underline; }

  .meta-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; flex-wrap: wrap; gap: 6px; }
  .meta-row div { flex: 1 1 30%; }
  .fill-line { display: inline-block; border-bottom: 1px solid #888; min-width: 90px; }

  .instructions { font-size: 12px; background: #f7f7f7; border: 1px dashed #bbb; border-radius: 6px; padding: 6px 10px; margin: 10px 0 16px; }

  .question { margin-bottom: 16px; page-break-inside: avoid; }
  .qhead { display: flex; justify-content: space-between; gap: 10px; font-size: 14px; }
  .qhead .qnum { font-weight: 700; }
  .qtext-en { margin-top: 2px; font-size: 14px; }
  .qtext-ur { margin-top: 4px; font-size: 16px; direction: rtl; font-family: "Noto Nastaliq Urdu", "Jameel Noori Nastaleeq", serif; line-height: 1.7; }
  .marks { font-size: 12px; color: #555; white-space: nowrap; }

  .visual-row { margin: 6px 0; font-size: 26px; letter-spacing: 6px; }

  .options { margin-top: 6px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 14px; font-size: 13px; }
  .options .opt { display: flex; gap: 6px; align-items: baseline; }
  .opt .circle { display: inline-block; width: 14px; height: 14px; border: 1px solid #444; border-radius: 50%; flex-shrink: 0; }

  .answer-space { border-bottom: 1px dotted #999; height: 22px; margin-top: 6px; }

  .footer-note { text-align: center; font-size: 11px; color: #888; margin-top: 24px; border-top: 1px solid #ddd; padding-top: 8px; }

  #status { text-align: center; padding: 40px; color: #666; }

  @media print {
    body { background: #fff; }
    .toolbar { display: none; }
    .sheet { box-shadow: none; margin: 0; max-width: none; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <button onclick="window.print()">🖨️ Print / Save as PDF</button>
  <span id="toolbarInfo"></span>
</div>

<div id="status">Paper load ho raha hai...</div>
<div class="sheet" id="sheet" style="display:none">

  <div class="letterhead">
    <img class="logo" id="logoImg" style="display:none" />
    <div class="names">
      <div class="school-en" id="schoolNameEn"></div>
      <div class="school-ur" id="schoolNameUr"></div>
      <div class="address" id="schoolAddress"></div>
    </div>
  </div>

  <div class="paper-title">
    <h2 id="paperTitle"></h2>
  </div>

  <div class="meta-row">
    <div>Name / نام: <span class="fill-line">&nbsp;</span></div>
    <div>Class / جماعت: <span class="fill-line" id="metaClass"></span></div>
    <div>Date / تاریخ: <span class="fill-line">&nbsp;</span></div>
  </div>
  <div class="meta-row">
    <div>Roll No / رول نمبر: <span class="fill-line">&nbsp;</span></div>
    <div>Total Marks / کل نمبر: <span class="fill-line" id="metaMarks"></span></div>
    <div>Time / وقت: <span class="fill-line">&nbsp;</span></div>
  </div>

  <div class="instructions">Attempt all questions. / تمام سوالات کے جواب دیں۔</div>

  <div id="questionsContainer"></div>

  <div class="footer-note">Generated with AII Smart Paper Maker</div>
</div>

<script>
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function setVar(name, value) {
  document.documentElement.style.setProperty(name, value);
}

async function loadPaper() {
  const paperId = getParam('paper_id');
  if (!paperId) {
    document.getElementById('status').textContent = 'Error: paper_id URL mein nahi mila.';
    return;
  }

  try {
    const [paperRes, settingsRes] = await Promise.all([
      fetch(`/api/paper/${paperId}`),
      fetch('/api/school-settings'),
    ]);

    if (!paperRes.ok) throw new Error('Paper nahi mila.');
    const { paper, questions } = await paperRes.json();
    const settings = await settingsRes.json();

    // Letterhead
    if (settings.logo_base64) {
      const img = document.getElementById('logoImg');
      img.src = settings.logo_base64;
      img.style.display = 'block';
    }
    document.getElementById('schoolNameEn').textContent = settings.school_name || '';
    document.getElementById('schoolNameUr').textContent = settings.school_name_ur || '';
    document.getElementById('schoolAddress').textContent = settings.address || '';
    if (settings.accent_color) setVar('--accent', settings.accent_color);

    document.getElementById('paperTitle').textContent = `${paper.subject} — Examination Paper`;
    document.getElementById('metaClass').textContent = paper.class_name || '';
    document.getElementById('metaMarks').textContent = paper.total_marks;

    const container = document.getElementById('questionsContainer');
    questions.forEach((q, i) => {
      const optsEn = JSON.parse(q.options_en || '[]');
      const optsUr = JSON.parse(q.options_ur || '[]');

      const div = document.createElement('div');
      div.className = 'question';

      let visualHtml = '';
      if (q.visual_emoji && q.visual_count) {
        visualHtml = `<div class="visual-row">${q.visual_emoji.repeat(q.visual_count)}</div>`;
      }

      let optsHtml = '';
      if (optsEn.length) {
        optsHtml = '<div class="options">' + optsEn.map((o, idx) => `
          <div class="opt"><span class="circle"></span><span>${o}${optsUr[idx] ? ' / ' + optsUr[idx] : ''}</span></div>
        `).join('') + '</div>';
      } else {
        optsHtml = '<div class="answer-space"></div>';
      }

      div.innerHTML = `
        <div class="qhead">
          <div><span class="qnum">Q${i + 1}.</span> <span class="qtext-en">${q.question_en || ''}</span></div>
          <div class="marks">[${q.marks}]</div>
        </div>
        <div class="qtext-ur">${q.question_ur || ''}</div>
        ${visualHtml}
        ${optsHtml}
      `;
      container.appendChild(div);
    });

    document.getElementById('status').style.display = 'none';
    document.getElementById('sheet').style.display = 'block';
    document.getElementById('toolbarInfo').textContent = `${questions.length} questions, ${paper.total_marks} marks`;
  } catch (e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  }
}

loadPaper();
</script>
</body>
</html>
