# Nixpacks build customisation for Railway.
#
# Ye sirf PDF export ke liye chahiye: docx -> PDF LibreOffice (soffice) ke
# headless subprocess se hota hai (export_service.py). Inke baghair PDF export
# 502 deta hai aur Urdu/emoji boxes ban jaate hain — Word (.docx) export bina
# in sab ke theek chalta hai.
#
#   libreoffice-writer        -> docx->pdf conversion engine (soffice /usr/bin)
#   fonts-noto-nastaliq-urdu  -> Urdu Nastaliq glyphs (rendered PDF mein)
#   fonts-noto-core           -> general Latin/script coverage
#   fonts-noto-color-emoji    -> visual_emoji wale questions ke liye
#
# Note: export_service URDU_FONT = "Jameel Noori Nastaleeq" maangti hai jo apt
# par nahi; LibreOffice substitute karega aur Noto Nastaliq Urdu use hoga —
# render-able, par exact Jameel Noori fidelity nahi. Full match ke liye woh
# font file alag se install karni hogi.

[phases.setup]
aptPkgs = [
    "libreoffice-writer",
    "fonts-noto-nastaliq-urdu",
    "fonts-noto-core",
    "fonts-noto-color-emoji",
]
